# golangci-lint configuration for pptx-go.
# See CLAUDE.md §5 (code conventions) and §13 (forbidden practices).

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - errorlint
    - gocritic
    - nolintlint
    - unconvert
    - copyloopvar

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/hurtener/pptx-go
  misspell:
    locale: US
  errorlint:
    errorf: true
  revive:
    rules:
      - name: package-comments
        disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files may use dot-imports and skip some hardening.
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
