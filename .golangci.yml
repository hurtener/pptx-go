# golangci-lint v2 configuration for pptx-go.
# See CLAUDE.md §5 (code conventions) and §13 (forbidden practices).
#
# Scope ramp: the upstream-inherited packages (opc, parts, pptx, utils, test)
# are excluded for now — Wave 1 reorganizes them into internal/opc and
# internal/ooxml/* (Phase 01) and rewrites the builder (Phase 02–03). Each
# package comes under the linter as that migration lands; new code
# (internal/...) is fully linted today.
version: "2"

run:
  timeout: 5m

linters:
  default: standard # govet, errcheck, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - misspell
    - nolintlint
    - revive
    - unconvert
  settings:
    misspell:
      locale: US
    errorlint:
      errorf: true
    revive:
      rules:
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    paths:
      - ^opc/
      - ^parts/
      - ^pptx/
      - ^utils/
      - ^test/

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/hurtener/pptx-go
  exclusions:
    paths:
      - ^opc/
      - ^parts/
      - ^pptx/
      - ^utils/
      - ^test/
